site_name: MinuteMenu Docs
site_url: https://minutemenu.github.io/docs/
repo_url: https://github.com/MinuteMenu/docs
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture:
    - System Overview: architecture/system-overview.md
  - Flows:
    - Authentication:
      - Overview: flows/authentication/overview.md
      - SAML SSO Architecture: flows/authentication/saml-sso-architecture.md
      - SAML SSO - Client Migration Guide: flows/authentication/saml-sso-client-migration-guide.md
      - SAML SSO - Complete Guide: flows/authentication/saml-sso-complete-guide.md
    - EForm:
      - Enrollment Flow: flows/eform/enrollment-flow.md
  - Components:
    - EForm: components/eform.md
    - Authentication: components/authentication.md
    - Claims Processing: components/claims-processing.md
    - CX Sponsor:
      - SFSP/ARAS:
        - Overview: components/cx-sfsp-aras/overview.md
        - Attendance & Meal Counts: components/cx-sfsp-aras/attendance.md
        - Food Transfer: components/cx-sfsp-aras/food-transfer.md
        - Meal Delivery & Pickup: components/cx-sfsp-aras/meal-delivery-pickup.md
        - Reports: components/cx-sfsp-aras/reports.md
      - "Menu & Regular Attendance (TODO)": components/cx-sponsor/menu-attendance.md
      - "Children Management (TODO)": components/cx-sponsor/children-management.md
      - "Site Management (TODO)": components/cx-sponsor/site-management.md
      - "Administration (TODO)": components/cx-sponsor/administration.md
      - "Claims (TODO)": components/cx-sponsor/claims.md
      - "Payments (TODO)": components/cx-sponsor/payments.md
      - "CX Reports (TODO)": components/cx-sponsor/reports.md
